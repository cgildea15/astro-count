<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ThresholdEd | Space Academy Comparison</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="accessibility-nav">
        <button class="a11y-btn" onclick="toggleFocusMode()" aria-label="Toggle Focus Mode">👁️ Focus Mode</button>
    </nav>

    <header class="space-header" aria-hidden="true">🚀🛸🌌🧑‍🚀</header>

    <main role="main" style="display:contents;">
        <div class="instructions" id="inst" aria-live="polite">
            Click a Lion, then click a Monkey to find a pair! 
        </div>

        <div class="comparison-cards-container">
            <section class="card-face" id="groupACard" aria-labelledby="labelA">
                <h2 class="group-label" id="labelA">Group A</h2>
                <div class="matching-area" id="areaA" role="img"></div>
            </section>

            <section class="card-face" id="groupBCard" aria-labelledby="labelB">
                <h2 class="group-label" id="labelB">Group B</h2>
                <div class="matching-area" id="areaB" role="img"></div>
            </section>
        </div>

        <div class="source-box">
            <p id="starHint">Finally, drag the star to the group with leftovers:</p>
            <div class="draggable-star" id="star" draggable="true" role="button" aria-describedby="starHint">🌟</div>
        </div>

        <div class="feedback-area" id="feedback" aria-live="assertive"></div>
        <button class="btn" id="nextBtn" style="display: none;" onclick="initLevel()">Next Mission 🚀</button>
    </main>

    <script type="module" src="firebase-config.js"></script>

    <script type="module" src="script.js"></script>
    
    <script>
        // Simple toggle for the focus mode button
        function toggleFocusMode() {
            document.body.classList.toggle('focus-mode');
        }
    </script>
</body>
</html>
